<div class="bc-helpHead">
  <span class="bc-helpTitle">Chart Library</span>
</div>
<div class="bc-helpBody">
  <p class="bc-sub" style="font-size: 0.8rem;">
    Click <strong>Add</strong> to place a chart on the visualization grid.
  </p>

  @for (cat of categories; track cat) {
    <div class="bc-catalogSection">
      <h4 class="bc-catalogHead">
        <i class="bi me-2" [ngClass]="categoryIcon(cat)"></i>{{ cat }}
      </h4>
      @for (w of widgetsForCategory(cat); track w.id) {
        <div class="bc-catalogItem" [class.bc-catalogItemActive]="isActive(w.id)">
          <div class="bc-catalogInfo">
            <span class="bc-catalogTitle">{{ w.title }}</span>
            <span class="bc-catalogDesc">{{ w.description }}</span>
          </div>
          <button class="btn btn-sm bc-btnPrimary bc-catalogAdd" type="button"
            [disabled]="isActive(w.id)"
            (click)="addWidget.emit(w)">
            {{ isActive(w.id) ? 'Added' : 'Add' }}
          </button>
        </div>
      }
    </div>
  }
</div>
