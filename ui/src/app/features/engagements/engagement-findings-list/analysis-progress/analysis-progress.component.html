<div class="ap-overlay">
  <div class="ap-card">
    <!-- Scanline effect -->
    <div class="ap-scanline"></div>

    <!-- Header -->
    <div class="ap-header">
      <div class="ap-beacon" [class.ap-beaconDone]="status === 'done'" [class.ap-beaconFail]="status === 'failed'"></div>
      <span class="ap-title" *ngIf="status === 'running'">STATIC ANALYSIS IN PROGRESS</span>
      <span class="ap-title" *ngIf="status === 'done'">ANALYSIS COMPLETE</span>
      <span class="ap-title" *ngIf="status === 'failed'">ANALYSIS FAILED</span>
    </div>

    <!-- Filename -->
    <div class="ap-file">
      <i class="bi bi-file-earmark-binary"></i>
      <span>{{ filename }}</span>
    </div>

    <!-- Progress bar -->
    <div class="ap-progressTrack">
      <div class="ap-progressFill" [style.width.%]="progressPercent"
        [class.ap-progressDone]="status === 'done'"
        [class.ap-progressFail]="status === 'failed'">
      </div>
      <span class="ap-progressLabel">{{ progressPercent }}%</span>
    </div>

    <!-- Steps -->
    <div class="ap-steps">
      <div class="ap-step" *ngFor="let step of steps"
        [class.ap-stepActive]="step.status === 'in_progress'"
        [class.ap-stepDone]="step.status === 'done'">
        <div class="ap-stepIcon">
          <i class="bi bi-check-lg" *ngIf="step.status === 'done'"></i>
          <span class="ap-spinner" *ngIf="step.status === 'in_progress'"></span>
          <span class="ap-dot" *ngIf="step.status === 'pending'"></span>
        </div>
        <span class="ap-stepLabel">{{ step.label }}</span>
        <span class="ap-stepStatus">
          <span *ngIf="step.status === 'done'">done</span>
          <span *ngIf="step.status === 'in_progress'">analyzing</span>
          <span *ngIf="step.status === 'pending'">pending</span>
        </span>
      </div>
    </div>

    <!-- Footer -->
    <div class="ap-footer">
      <span class="ap-findings" *ngIf="findingsCreated > 0">
        Findings created: {{ findingsCreated }}
      </span>
      <span class="ap-error" *ngIf="status === 'failed'">{{ errorMessage || 'Analysis failed. Check logs for details.' }}</span>
      <button class="btn btn-sm btn-outline-light bc-btnSoft mt-2"
        *ngIf="status === 'done' || status === 'failed'"
        (click)="dismiss()">
        Close
      </button>
    </div>
  </div>
</div>
