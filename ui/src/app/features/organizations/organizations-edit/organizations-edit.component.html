<div class="bc-pageWrap bc-pageWide">
  <div class="bc-pageInner">

    <div class="bc-pageCard mb-3">
      <div class="bc-pageCardHead">
        <div class="bc-pageCardTitle">
          <div class="bc-h1">Edit Client</div>
          <div class="bc-sub">Update client details.</div>
        </div>
        <div class="bc-pageCardTools">
          <button class="btn btn-outline-light bc-iconBtn" type="button" (click)="goBack()">
            <i class="bi bi-arrow-left"></i>
            <span>Back</span>
          </button>
          <button class="btn btn-outline-light bc-iconBtn" type="button" (click)="toggleHelp()">
            <i class="bi bi-question-circle"></i>
            <span>Help</span>
          </button>
        </div>
      </div>
    </div>

    <div class="bc-helpLayout bc-helpLayoutRight" [class.is-helpOpen]="showHelp">

      <main>

        <!-- Loading state -->
        <div class="bc-card" *ngIf="loading$ | async">
          <div class="bc-cardInner p-4">
            <div class="bc-sub">Loading client details...</div>
          </div>
        </div>

        <!-- Edit form -->
        <ng-container *ngIf="(loading$ | async) === false && organization$ | async as org">
          <div class="alert alert-danger" *ngIf="serverError$ | async as err">{{ err }}</div>

          <div class="bc-card">
            <div class="bc-cardInner p-4">
              <app-organization-form
                mode="edit"
                [organization]="org"
                [saving]="(saving$ | async) ?? false"
                (formSubmit)="onSubmit($event)"
                (formCancel)="onCancel()">
              </app-organization-form>
            </div>
          </div>
        </ng-container>

      </main>

      <!-- Help aside -->
      <aside class="bc-helpPane" *ngIf="showHelp">
        <div class="bc-helpHead">
          <div>
            <div class="bc-helpKicker">Help</div>
            <div class="bc-helpTitle">Edit Client</div>
          </div>
          <button class="btn btn-sm btn-outline-light bc-btnSoft" type="button" (click)="toggleHelp()">
            <i class="bi bi-x-lg"></i>
          </button>
        </div>
        <div class="bc-helpBody">
          <div class="bc-sub mb-2">
            Update the client's details including name, website, status, and notes.
          </div>
          <ul class="bc-helpList">
            <li><strong>Name:</strong> The display name for this client.</li>
            <li><strong>Status:</strong> Set to inactive to archive the client.</li>
          </ul>
        </div>
      </aside>

    </div>

  </div>
</div>
