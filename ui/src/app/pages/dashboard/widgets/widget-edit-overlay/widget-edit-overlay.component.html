<div class="bc-editOverlay">
  <div class="bc-editControls">
    <div class="bc-editLeft">
      <i class="bi bi-grip-vertical bc-dragHandle" title="Drag to reorder"></i>
    </div>
    <div class="bc-editRight">
      <button class="bc-editBtn bc-editRemove" type="button" title="Remove widget"
        (click)="remove.emit()">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>
  </div>
</div>
