<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}BytesCop{% endblock %}</title>
  <!--[if mso]>
  <style>body,table,td{font-family:Arial,Helvetica,sans-serif !important;}</style>
  <![endif]-->
</head>
<body style="margin:0; padding:0; background-color:#070a0f; font-family:Arial, Helvetica, sans-serif; -webkit-text-size-adjust:100%; -ms-text-size-adjust:100%;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#070a0f;">
    <tr>
      <td align="center" style="padding:40px 16px;">
        <!-- Main card -->
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="background-color:#0d1117; border:1px solid #1e2530; border-radius:8px;">
          <!-- Header: BYTESCOP branding -->
          <tr>
            <td align="center" style="padding:28px 48px 16px;">
              <p style="margin:0; font-size:24px; font-weight:700; color:#00ffb3; letter-spacing:3px; line-height:1.3; font-family:'Courier New', Courier, monospace;">
                BYTESCOP
              </p>
            </td>
          </tr>
          <!-- Tenant name -->
          <tr>
            <td align="center" style="padding:0 48px 24px; border-bottom:1px solid #1e2530;">
              <p style="margin:0; font-size:16px; font-weight:700; color:#e6edf3; line-height:1.3;">
                {{ tenant_name | default('BYTESCOP', true) }}
              </p>
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="padding:32px 48px 40px;">
              {% block content %}{% endblock %}
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td align="center" style="padding:24px 48px; border-top:1px solid #1e2530;">
              <p style="margin:0 0 8px; font-size:13px; color:#8b949e; line-height:1.6;">
                Sent by <a href="https://bytescop.com" style="color:#00b7ff; text-decoration:none; font-weight:600;">bytescop.com</a> &mdash; a security platform
              </p>
              <p style="margin:0; font-size:12px; color:#8b949e; line-height:1.6;">
                For inquiries, reach us at <a href="mailto:team@bytescop.com" style="color:#00b7ff; text-decoration:none;">team@bytescop.com</a>
              </p>
            </td>
          </tr>
        </table>
        <!-- Sub-footer -->
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0">
          <tr>
            <td align="center" style="padding:20px 48px;">
              <p style="margin:0; font-size:12px; color:#8b949e; line-height:1.5;">
                You received this email because you are a member of this organization.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
