upstream api {
    server api:8000;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/nginx/ssl/bytescop.crt;
    ssl_certificate_key /etc/nginx/ssl/bytescop.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    server_tokens off;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'none'" always;

    client_max_body_size 10M;

    # Sample uploads need a higher body size limit (malware binaries)
    location /api/engagements/ {
        client_max_body_size 200M;
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 8k;
    }

    # API proxy
    location /api/ {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Buffering (protects gunicorn from slow clients)
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 8k;
    }

    # Health check
    location /api/health/ {
        proxy_pass http://api;
        proxy_set_header Host $host;
    }

    # Font files from Angular build (bootstrap-icons, etc.)
    # Must come before /media/ to avoid being intercepted by Django media alias
    location ~* ^/media/.*\.(woff2?|ttf|eot)$ {
        root /app/ui;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Media files (uploaded content — logos, avatars, attachments)
    location /media/ {
        alias /app/media/;
        expires 1h;
        add_header Cache-Control "private, no-cache";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Angular frontend — serve static files, fallback to index.html for SPA routing
    location / {
        root /app/ui;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Never cache index.html so deploys take effect immediately
        location = /index.html {
            add_header Cache-Control "no-cache";
        }

        # Cache static assets aggressively (they have content hashes)
        location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
